<div class="login-container">
  <div class="login-box">
    <div class="login-icon">
      <i class="bi bi-person-circle"></i>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="input-wrapper">
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Correo electrónico" 
          required 
          email
          #emailField="ngModel">
        <small class="text-danger" *ngIf="emailField.invalid && emailField.touched">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="input-wrapper">
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Contraseña" 
          required
          #passField="ngModel">
        <small class="text-danger" *ngIf="passField.invalid && passField.touched">
          La contraseña es obligatoria.
        </small>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">
        Ingresar
      </button>

      <div class="register-link">
        <p>¿No tienes cuenta?</p>
        <a (click)="goToRegister()" style="cursor: pointer;">Crea una cuenta</a>
      </div>
    </form>
  </div>
</div>
