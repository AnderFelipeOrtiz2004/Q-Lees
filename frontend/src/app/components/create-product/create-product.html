<div class="create-wrapper">
  <header class="main-header">
    <div class="brand">
      <h1>Q-LESS</h1>
    </div>
    <nav class="main-nav">
      <a routerLink="/home">Inicio</a>
      <a routerLink="/productos">Productos</a>
      <a href="#">Blog</a>
    </nav>
    <div class="top-actions">
      <button class="btn-logout" (click)="goHome()">Cerrar Sesión</button>
    </div>
  </header>

  <main class="create-content">
    <form (ngSubmit)="saveProduct()" class="create-form" autocomplete="off">
      <h2 class="form-title">Crear Producto</h2>

      <div *ngIf="errors.length > 0" class="alerts-container">
        <div *ngFor="let alert of errors" [ngClass]="'alert alert-' + alert.type" role="alert">
          {{ alert.message }}
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre de producto</label>
          <input type="text" [(ngModel)]="name" name="name" required [disabled]="isLoading" />
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <input type="text" placeholder="Ej: Cuadernos" name="category" [disabled]="isLoading" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Precio del producto</label>
          <input type="number" [(ngModel)]="price" name="price" placeholder="$0.00" required [disabled]="isLoading" />
        </div>
        <div class="form-group">
          <label>Cantidad de producto en stock</label>
          <input type="number" [(ngModel)]="stock" name="stock" placeholder="0" required [disabled]="isLoading" />
        </div>
      </div>

      <div class="form-group full-width">
        <label>Descripcion del producto</label>
        <textarea [(ngModel)]="description" name="description" placeholder="Describe tu producto..." required [disabled]="isLoading"></textarea>
      </div>

      <div class="form-group full-width">
        <label>Imagenes del producto</label>
        <div class="image-upload-section">
          <input type="file" (change)="onFileSelected($event)" accept="image/png,image/jpg,image/jpeg" [disabled]="isLoading" style="display: none;" #fileInput />
          <div class="image-placeholders">
            <div class="image-placeholder" (click)="fileInput.click()">
              <img *ngIf="imagePreview" [src]="imagePreview" alt="Vista previa" style="width: 100%; height: 100%; object-fit: cover; border-radius: 6px;" />
              <span *ngIf="!imagePreview">+</span>
              <button *ngIf="imagePreview" type="button" class="btn-remove-image" (click)="clearImage(); $event.stopPropagation();">✕</button>
            </div>
            <div class="image-placeholder-empty"></div>
            <div class="image-placeholder-empty"></div>
            <div class="image-placeholder-empty"></div>
            <div class="image-placeholder-empty"></div>
          </div>
          <small class="text-muted">Formatos: PNG, JPG, JPEG (máx. 5MB)</small>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" routerLink="/home">Cancelar</button>
        <button type="submit" class="btn-create" [disabled]="isLoading">
          {{ isLoading ? 'Guardando...' : 'Crear_producto' }}
        </button>
      </div>
    </form>
  </main>
</div>
