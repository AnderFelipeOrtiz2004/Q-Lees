<div class="home-wrapper">
  <header class="main-header">
    <div class="brand">
      <h1>Q-LESS</h1>
    </div>
    <nav class="main-nav">
      <a routerLink="/home">Inicio</a>
      <a routerLink="/productos">Productos</a>
      <a href="#">Blog</a>
    </nav>
    <div class="top-actions">
      <input type="search" placeholder="Buscar productos..." [(ngModel)]="searchText" />
      <a class="btn-create" routerLink="/nuevo-producto">+ Crear Producto</a>
      <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
    </div>
  </header>

  <section class="hero">
    <h2>Bienvenido, {{ userName }}</h2>
    <p>Administra tus productos desde un panel moderno y rápido.</p>
  </section>

  <main class="content-card">
    <div *ngIf="productos.length > 0" class="container d-flex flex-wrap gap-3">
      <div *ngFor="let p of productos" class="card" style="width: 18rem; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <img [src]="'http://127.0.0.1:8000/' + p.image_path" class="card-img-top" alt="producto" style="height: 200px; object-fit: cover; border-top-left-radius: 15px; border-top-right-radius: 15px;" />
        <div class="card-body text-center">
          <h5 class="card-title"><strong>{{ p.nombre }}</strong></h5>
          <p class="card-text text-success font-weight-bold">Precio: ${{ p.precio }}</p>
          <p class="card-text text-muted">Stock: {{ p.stock }}</p>
          <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-primary btn-sm" [routerLink]="['/editar-producto', p.id]">Editar</button>
            <button class="btn btn-danger btn-sm" (click)="eliminar(p.id)">Eliminar</button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="productos.length === 0" class="empty-state">
      <p *ngIf="searchText.trim().length > 0">No se encontraron productos para "{{ searchText }}"</p>
      <p *ngIf="searchText.trim().length === 0">No hay productos de momento. Crea el primero.</p>
    </div>
  </main>
</div>
